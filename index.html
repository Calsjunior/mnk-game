<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNK-Game</title>

    <link rel="icon" type="image/x-icon" href="./assets/favicon.png">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    >

    <script src="src/main.js" type="module"></script>
  </head>

  <body>
    <button id="btn-return" type="button" class="button button--return">
      Return to menu
    </button>

    <div id="screen-menu" class="mnk__menu">
      <button
        id="btn-start"
        data-action="game"
        type="button"
        class="button button--start"
      >
        Start Game
      </button>
      <button
        id="btn-settings"
        data-action="settings"
        type="button"
        class="button button__settings"
      >
        Settings
      </button>
    </div>

    <div id="screen-game" class="mnk__game">
      <h2 id="container-status" class="mnk__turn"></h2>
      <div id="container-board" class="mnk__board"></div>
      <button id="btn-reset" type="button" class="button button--reset">
        Reset Game
      </button>
    </div>

    <div id="screen-settings" class="settings">
      <h2 class="settings__title">Game Rules:</h2>

      <div id="game-rules" class="settings__rules">
        <label class="settings__label" for="rows-settings">Rows:</label>
        <input
          class="settings__input"
          id="rows-settings"
          type="number"
          min="3"
          max="15"
          value="3"
        >

        <label class="settings__label" for="cols-settings">Cols:</label>
        <input
          class="settings__input"
          id="cols-settings"
          type="number"
          min="3"
          max="15"
          value="3"
        >

        <label class="settings__label" for="win-settings">Rows to win:</label>
        <input
          class="settings__input"
          id="win-settings"
          type="number"
          min="3"
          max="15"
          value="3"
        >

        <label class="settings__label" for="player-settings">Players:</label>
        <input
          class="settings__input"
          id="player-settings"
          type="number"
          min="2"
          max="10"
          value="2"
        >
      </div>

      <h2 class="settings__title">Players</h2>
      <div id="container-players" class="settings__players"></div>
    </div>
  </body>
</html>
