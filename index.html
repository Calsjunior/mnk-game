<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNK-Game</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">

    <script src="js/main.js" defer></script>
  </head>

  <body>
    <div id="menu" class="mnk__menu">
      <button data-action="game" type="button" class="button__start">
        Start Game
      </button>
      <button data-action="settings" type="button" class="button__settings">
        Settings
      </button>
    </div>

    <div id="in-game" class="mnk__game" style="display: none;">
      <h2 id="player-turn" class="mnk__turn"></h2>
      <div id="board" class="mnk__board"></div>
      <button id="reset-btn" type="button" class="button__reset">
        Reset Game
      </button>
    </div>
  </body>
</html>
