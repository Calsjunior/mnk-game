<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNK-Game</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">

    <script src="js/main.js" defer></script>
  </head>

  <body>
    <div class="mnk__menu">
      <button data-action="game" type="button" class="mnk__start">
        Start Game
      </button>
      <button data-action="settings" type="button" class="mnk__settings">
        Settings
      </button>
    </div>

    <div class="mnk__game" style="display: none;">
      <h2 class="mnk__turn"></h2>
      <div class="mnk__board"></div>
      <button type="button" class="mnk__reset">Reset Game</button>
    </div>
  </body>
</html>
