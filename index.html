<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNK-Game</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">

    <script src="src/main.js" type="module"></script>
  </head>

  <body>
    <button id="btn-return" type="button" class="button__return">
      Return to menu
    </button>

    <div id="screen-menu" class="mnk__menu">
      <button
        id="btn-start"
        data-action="game"
        type="button"
        class="button__start"
      >
        Start Game
      </button>
      <button
        id="btn-settings"
        data-action="settings"
        type="button"
        class="button__settings"
      >
        Settings
      </button>
    </div>

    <div id="screen-game" class="mnk__game">
      <h2 id="container-status" class="mnk__turn"></h2>
      <div id="container-board" class="mnk__board"></div>
      <button id="btn-reset" type="button" class="button__reset">
        Reset Game
      </button>
    </div>

    <div id="screen-settings" class="mnk__settings"></div>
  </body>
</html>
