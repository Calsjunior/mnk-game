<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNK-Game</title>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">

    <script src="js/main.js" defer></script>
  </head>

  <body>
    <div id="menu" class="mnk__menu">
      <button data-action="game" type="button" class="button__start">
        Start Game
      </button>
      <button data-action="settings" type="button" class="button__settings">
        Settings
      </button>
    </div>

    <div class="mnk__settings" id="in-settings" style="display: none;">
      <h2>Game Rules:</h2>

      <div id="game-rules">
        <label for="rows-settings">Rows:</label>
        <input id="rows-settings" type="number" min="3" max="15" value="3">

        <label for="cols-settings">Cols:</label>
        <input id="cols-settings" type="number" min="3" max="15" value="3">

        <label for="win-settings">Rows to win:</label>
        <input id="win-settings" type="number" min="3" max="15" value="3">

        <label for="player-settings">Players:</label>
        <input id="player-settings" type="number" min="2" max="10" value="2">
      </div>

      <h2>Players</h2>
    </div>
    <div id="in-game" class="mnk__game" style="display: none;">
      <h2 id="player-turn" class="mnk__turn"></h2>
      <div id="board" class="mnk__board"></div>
      <button id="reset-btn" type="button" class="button__reset">
        Reset Game
      </button>
    </div>
  </body>
</html>
